<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>UI/UX Banner</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
}

/* container da imagem */
.banner{
    position:relative;
}

.banner img{
    width:100%;
    max-height:500px;
    object-fit:cover;
}

/* texto animado */
.texto-movendo{
    position:absolute;
    bottom:20px;
    width:100%;
    overflow:hidden;
    white-space:nowrap;
    font-size:50px;
    font-weight:bold;
    color:white;
}

/* animação */
.texto-movendo span{
    display:inline-block;
    padding-left:100%;
    animation:mover 12s linear infinite;
}

@keyframes mover{
    0%{
        transform:translateX(-100%);
    }
    100%{
        transform:translateX(100%);
    }
}

</style>
</head>

<body>

<div class="banner">

<img src="imagem.jpg.jpeg" alt="UI UX">

<div class="texto-movendo">
<span>Strategy — UI/UX — Creative Direction — Brand Strategy — UI/UX — Creative Direction</span>
</div>

</div>

</body>
</html>
