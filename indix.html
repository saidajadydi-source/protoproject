<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>UI/UX Banner</title>

<style>

body{
margin:0;
overflow-x:hidden;
font-family:Arial, Helvetica, sans-serif;
}

.banner{
position:relative;
width:100%;
height:500px;
overflow:hidden;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
display:block; /* remove espaço branco */
}

/* NAVBAR */
.navbar{
position:absolute;
top:20px;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 60px;
box-sizing:border-box;
}

.logo{
font-size:18px;
font-weight:bold;
color:black;
}

.menu a{
margin-left:30px;
text-decoration:none;
color:black;
font-size:16px;
font-weight:500;
}

/* texto passando em cima da imagem */
.texto{
position:absolute;
bottom:40px;
left:0;
width:100%;
overflow:hidden;
white-space:nowrap;
}

.texto span{
font-size:60px;
font-weight:bold;
color:white;
display:inline-block;
animation:mover 10s linear infinite;
}

/* animação */
@keyframes mover{
0%{
transform:translateX(-100%);
}
100%{
transform:translateX(100%);
}
}

</style>
</head>

<body>

<div class="banner">

<div class="navbar">
<div class="logo">@CharlesHaggas</div>

<div class="menu">
<a href="#">about</a>
<a href="#">work</a>
<a href="#">insight</a>
<a href="#">contact</a>
</div>
</div>

<img src="imagem.jpg.jpeg">

<div class="texto">
<span>
Strategy — UI/UX — Creative Direction — Brand Strategy — UI/UX — Creative Direction —
</span>
</div>

</div>

</body>
</html>
