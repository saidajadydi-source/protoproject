<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>UI/UX Banner</title>

<style>

body{
margin:0;
overflow-x:hidden;
font-family:Arial, Helvetica, sans-serif;
}

.banner{
position:relative;
width:100%;
height:500px;
overflow:hidden;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
}

/* NAVBAR */
.navbar{
position:absolute;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
box-sizing:border-box;
}

/* esquerda */
.logo{
color:black;
font-weight:bold;
font-size:16px;
}

/* direita */
.menu a{
margin-left:20px;
text-decoration:none;
color:white;
font-weight:bold;
font-size:16px;
}

/* texto passando em cima da imagem */
.texto{
position:absolute;
bottom:40px;
left:0;
width:100%;
overflow:hidden;
white-space:nowrap;
}

.texto span{
font-size:60px;
font-weight:bold;
color:white;
display:inline-block;
animation:mover 10s linear infinite;
}

/* animação */
@keyframes mover{
0%{
transform:translateX(-100%);
}
100%{
transform:translateX(100%);
}
}

</style>
</head>

<body>

<div class="banner">

<img src="imagem.jpg.jpeg">

<!-- NAVBAR -->
<div class="navbar">

<div class="logo">
@CharlesHaggas
</div>

<div class="menu">
<a href="#">About</a>
<a href="#">Work</a>
<a href="#">Insight</a>
<a href="#">Contact</a>
</div>

</div>

<div class="texto">
<span>
Strategy — UI/UX — Creative Direction — Brand Strategy — UI/UX — Creative Direction —
</span>
</div>

</div>

</body>
</html>
