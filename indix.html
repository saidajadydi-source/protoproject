<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>UI/UX Banner</title>

<style>

body{
margin:0;
overflow-x:hidden;
font-family:Arial, Helvetica, sans-serif;
}

/* banner */
.banner{
position:relative;
width:100%;
height:500px;
overflow:hidden;
line-height:0; /* remove espaço branco */
}

/* imagem */
.banner img{
width:100%;
height:100%;
object-fit:cover;
display:block; /* remove espaço da imagem */
}

/* texto passando */
.texto{
position:absolute;
bottom:40px;
left:0;
width:100%;
overflow:hidden;
white-space:nowrap;
z-index:2;
}

.texto span{
font-size:60px;
font-weight:bold;
color:white;
display:inline-block;
animation:mover 10s linear infinite;
text-shadow:0 5px 20px rgba(0,0,0,0.5);
}

/* animação */
@keyframes mover{
0%{
transform:translateX(-100%);
}
100%{
transform:translateX(100%);
}
}

</style>
</head>

<body>

<div class="banner">

<img src="imagem.jpg.jpeg" alt="banner">

<div class="texto">
<span>
Strategy — UI/UX — Creative Direction — Brand Strategy — UI/UX — Creative Direction —
</span>
</div>

</div>

</body>
</html>
